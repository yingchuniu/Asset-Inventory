<form class="asset-form" [formGroup]="insertForm">

  <!-- header -->
  <div class="form-header">
    資產盤點與評鑑-新增
  </div>

  <!-- 資產價值 -->
  <div class="section">

    <div class="section-left">
      資產價值
    </div>

    <div class="section-right">

      <div class="asset-grid">

        <label>機密性(C)</label>
        <select formControlName="confidentiality">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
          <option [value]="3">3</option>
          <option [value]="4">4</option>
          <option [value]="5">5</option>
        </select>

        <label>完整性(I)</label>
        <select formControlName="integrity">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
          <option [value]="3">3</option>
          <option [value]="4">4</option>
          <option [value]="5">5</option>
        </select>

        <label>可用性(A)</label>
        <select formControlName="availability">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
          <option [value]="3">3</option>
          <option [value]="4">4</option>
          <option [value]="5">5</option>
        </select>

        <label>價值</label>
        <input formControlName="asset_value" readonly>

        <label>價值等級</label>
        <input formControlName="asset_level" readonly>
        <label>機密等級</label>
        <input formControlName="security_level" readonly>
      </div>

    </div>

  </div>

  <!-- 風險評鑑 -->
  <div class="section">
    <div class="section-left">

    </div>

    <div class="section-right">

      <div class="risk-grid">
        <label>資產項目</label>
        <input formControlName="asset_name" >
         <label>風險擁有者</label>
        <input formControlName="owner" >
      </div>
    </div>
  </div>

  <div class="section">

    <div class="section-left">
      風險評鑑
    </div>

<div class="section-right">


    <div class="risk-box">

      <div class="risk-grid">

        <label>威脅一</label>
        <select [value]="risks[0].threat" (change)="risks[0].threat = $any($event.target).value">
          <option value="資料外洩">資料外洩</option>
          <option value="資料竄改">資料竄改</option>
          <option value="未授權查詢">未授權查詢</option>
          <option value="未授權存取">未授權存取</option>
        </select>

        <label>脆弱點一</label>
        <select [value]="risks[0].vulnerability" (change)="risks[0].vulnerability = $any($event.target).value">
          <option value="權限檢查不足">權限檢查不足</option>
          <option value="備份驗證不足">備份驗證不足</option>
          <option value="帳號管理不當">帳號管理不當</option>
          <option value="權限控管不足">權限控管不足</option>
        </select>

        <label>威脅說明</label>
        <input
          type="text"
          [value]="risks[0].description"
          (input)="risks[0].description = $any($event.target).value">
      </div>

      <div class="cia-row">
        <label [for]="'c-1'">C-1</label>
        <input
          id="c-1"
          type="checkbox"
          [checked]="+risks[0].c_impact === 1"
          (change)="onImpactChange(risks[0], 'c_impact', $event)">

        <label [for]="'i-1'">I-1</label>
        <input
          id="i-1"
          type="checkbox"
          [checked]="+risks[0].i_impact === 1"
          (change)="onImpactChange(risks[0], 'i_impact', $event)">

        <label [for]="'a-1'">A-1</label>
        <input
          id="a-1"
          type="checkbox"
          [checked]="+risks[0].a_impact === 1"
          (change)="onImpactChange(risks[0], 'a_impact', $event)">
      </div>

      <div class="risk-grid">
        <label>衝擊程度</label>
        <select [value]="risks[0].impact_level" (change)="onRiskFieldChange(risks[0], 'impact_level', $event)">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
        </select>

        <label>可能性</label>
        <select [value]="risks[0].likelihood" (change)="onRiskFieldChange(risks[0], 'likelihood', $event)">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
        </select>

        <label>風險值</label>
        <div class="risk-score">
          {{ risks[0].risk_value }}
        </div>
      </div>

    </div>
  

 
    <div class="risk-box">

      <div class="risk-grid">

        <label>威脅二</label>
        <select [value]="risks[1].threat" (change)="risks[1].threat = $any($event.target).value">
          <option value="資料外洩">資料外洩</option>
          <option value="資料竄改">資料竄改</option>
          <option value="未授權查詢">未授權查詢</option>
          <option value="未授權存取">未授權存取</option>
        </select>

        <label>脆弱點二</label>
        <select [value]="risks[1].vulnerability" (change)="risks[1].vulnerability = $any($event.target).value">
          <option value="權限檢查不足">權限檢查不足</option>
          <option value="備份驗證不足">備份驗證不足</option>
          <option value="帳號管理不當">帳號管理不當</option>
          <option value="權限控管不足">權限控管不足</option>
        </select>

        <label>威脅說明</label>
        <input
          type="text"
          [value]="risks[1].description"
          (input)="risks[1].description = $any($event.target).value">
      </div>

      <div class="cia-row">
        <label [for]="'c-2'">C-2</label>
        <input
          id="c-2"
          type="checkbox"
          [checked]="+risks[1].c_impact === 1"
          (change)="onImpactChange(risks[1], 'c_impact', $event)">

        <label [for]="'i-2'">I-2</label>
        <input
          id="i-2"
          type="checkbox"
          [checked]="+risks[1].i_impact === 1"
          (change)="onImpactChange(risks[1], 'i_impact', $event)">

        <label [for]="'a-2'">A-2</label>
        <input
          id="a-2"
          type="checkbox"
          [checked]="+risks[1].a_impact === 1"
          (change)="onImpactChange(risks[1], 'a_impact', $event)">
      </div>

      <div class="risk-grid">
        <label>衝擊程度</label>
        <select [value]="risks[1].impact_level" (change)="onRiskFieldChange(risks[1], 'impact_level', $event)">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
        </select>

        <label>可能性</label>
        <select [value]="risks[1].likelihood" (change)="onRiskFieldChange(risks[1], 'likelihood', $event)">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
        </select>

        <label>風險值</label>
        <div class="risk-score">
          {{ risks[1].risk_value }}
        </div>
      </div>

    </div>
  

</div>


  </div>

  <!-- footer -->

  <div class="form-footer">
    <button class="btn-confirm" (click)="onSubmit()">確定</button>
    <button class="btn-cancel" (click)="activeModal.dismiss()">取消</button>
  </div>

</form>
